name: Event timing
description: The `event` and `first-input` performance entries and the `PerformanceEventTiming` API measures the latency of user input events, such as mouse clicks or keypresses. They're used to calculate Interaction to Next Paint (INP), a common metric for perceived responsiveness.
spec: https://w3c.github.io/event-timing/
group: performance
compat_features:
  core:
    - api.PerformanceEventTiming # former compute_from
    - api.PerformanceEventTiming.cancelable
    - api.PerformanceEventTiming.processingEnd
    - api.PerformanceEventTiming.processingStart
    - api.PerformanceEventTiming.toJSON
  modifier:
    - api.EventCounts
    - api.EventCounts.@@iterator
    - api.EventCounts.entries
    - api.EventCounts.forEach
    - api.EventCounts.get
    - api.EventCounts.has
    - api.EventCounts.keys
    - api.EventCounts.size
    - api.EventCounts.values
    - api.Performance.eventCounts
    - api.PerformanceEventTiming.interactionId
    - api.PerformanceEventTiming.target
