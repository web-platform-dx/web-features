name: Reporting API
description: The `Reporting-Endpoints` HTTP header and `ReportingObserver()` API send selected reports, such as Content Security Policy (CSP) violation reports or crash reports, to a nominated URL or callback function.
spec: https://w3c.github.io/reporting/
group: reporting
compat_features:
  core:
    - api.ReportingObserver
    - api.ReportingObserver.ReportingObserver # former compute_from
    - api.ReportingObserver.ReportingObserver.options_parameter
    - api.ReportingObserver.ReportingObserver.options_parameter.types_property
    - api.ReportingObserver.disconnect
    - api.ReportingObserver.observe
    - api.ReportingObserver.takeRecords
    - http.headers.Reporting-Endpoints # former compute_from
  spare:
    - api.ReportingObserver.worker_support
