name: HSL
description: The `hsl()` and `hsla()` CSS functions pick colors using hue, saturation, lightness, and alpha (transparency) channels.
spec: https://drafts.csswg.org/css-color-4/#the-hsl-notation
caniuse: css3-colors
group: color-types
compat_features:
  core:
    - css.types.color.hsl
    - css.types.color.hsl.alpha_parameter # former compute_from
    - css.types.color.hsl.space_separated_parameters
  spare:
    - css.types.color.hsl.mixed_type_parameters

# TODO: For alignment with caniuse, tag `hsla()` features when https://github.com/mdn/browser-compat-data/issues/24191 is resolved and update compute_from
