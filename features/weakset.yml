name: WeakSet
description: A `WeakSet` object stores unique values of any type without creating strong references to the values, such that membership in the set does not prevent garbage collection of the value.
spec: https://tc39.es/ecma262/multipage/keyed-collections.html#sec-weakset-objects
group: collections
compat_features:
  core:
    - javascript.builtins.WeakSet # former compute_from
    - javascript.builtins.WeakSet.WeakSet
    - javascript.builtins.WeakSet.add
    - javascript.builtins.WeakSet.delete
    - javascript.builtins.WeakSet.has
  modifier:
    - javascript.builtins.WeakSet.WeakSet.iterable_allowed
    - javascript.builtins.WeakSet.WeakSet.null_allowed
  spare:
    - javascript.builtins.WeakSet.symbol_as_keys
