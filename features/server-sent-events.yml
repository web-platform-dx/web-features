name: Server-sent events
description: The `EventSource` API creates a connection to a server and listens to a stream of events sent by the server.
spec: https://html.spec.whatwg.org/multipage/server-sent-events.html#server-sent-events
caniuse: eventsource
group: messaging
compat_features:
  core:
    - api.EventSource # former compute_from
    - api.EventSource.EventSource
    - api.EventSource.close
    - api.EventSource.error_event
    - api.EventSource.message_event
    - api.EventSource.open_event
    - api.EventSource.readyState
  modifier:
    - api.EventSource.EventSource.options_withCredentials_parameter
    - api.EventSource.url
    - api.EventSource.withCredentials
  spare:
    - api.EventSource.worker_support
