name: COEP violation reports
description: COEP violation reporting sends a report to a URL nominated by the `Reporting-Endpoints` header or the `ReportingObserver` API when a page violates its `Cross-Origin-Embedder-Policy` policy.
spec: https://html.spec.whatwg.org/multipage/browsers.html#coep-report-type
group: reporting
compat_features:
  - http.headers.Cross-Origin-Embedder-Policy.report-to_parameter
  - api.ReportingObserver.ReportingObserver.options_parameter.types_property.coep
