name: Window
description: "The `window` global object represents a browser tab or iframe and its relationship to the document and other tabs. It's also a generic global object, under which many other APIs are located."
spec: https://html.spec.whatwg.org/multipage/nav-history-apis.html#the-window-object
compat_features:
  core:
    - api.Window # former compute_from
    - api.Window.close
    - api.Window.closed
    - api.Window.focus
    - api.Window.frames
    - api.Window.length
    - api.Window.moveBy
    - api.Window.moveTo
    - api.Window.name
    - api.Window.opener
    - api.Window.resizeBy
    - api.Window.resizeTo
    - api.Window.screen
    - api.Window.screenX
    - api.Window.screenY
  modifier:
    - api.Window.DOMContentLoaded_event
    - api.Window.blur_event
    - api.Window.error_event
    - api.Window.focus_event
    - api.Window.frameElement
    - api.Window.innerHeight
    - api.Window.innerWidth
    - api.Window.load_event
    - api.Window.outerHeight
    - api.Window.outerWidth
    - api.Window.parent
    - api.Window.resize_event
    - api.Window.screenLeft
    - api.Window.screenTop
    - api.Window.self
    - api.Window.stop
    - api.Window.top
    - api.Window.window
  spare:
    - api.Window.open
    - api.Window.open.features_parameter_popup
    - api.Window.open.once_per_event
