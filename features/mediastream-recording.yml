name: MediaStream recording
description: The `MediaRecorder` API captures data generated by `MediaStream` or `HTMLMediaElement` objects for analysis, processing, or saving to disk. Also known as the Media Recording API.
spec: https://w3c.github.io/mediacapture-record/
compat_features:
  core:
    - api.BlobEvent
    - api.BlobEvent.BlobEvent
    - api.BlobEvent.data
    - api.MediaRecorder
    - api.MediaRecorder.MediaRecorder # former compute_from
    - api.MediaRecorder.dataavailable_event
    - api.MediaRecorder.isTypeSupported_static # former compute_from
    - api.MediaRecorder.mimeType
    - api.MediaRecorder.requestData
    - api.MediaRecorder.start # former compute_from
    - api.MediaRecorder.start_event
    - api.MediaRecorder.state # former compute_from
    - api.MediaRecorder.stop # former compute_from
    - api.MediaRecorder.stop_event
    - api.MediaRecorder.stream
  modifier:
    - api.MediaRecorder.MediaRecorder.options_parameter
    - api.MediaRecorder.audioBitsPerSecond
    - api.MediaRecorder.pause
    - api.MediaRecorder.pause_event
    - api.MediaRecorder.resume
    - api.MediaRecorder.resume_event
    - api.MediaRecorder.videoBitsPerSecond
  spare:
    - api.BlobEvent.timecode
    - api.MediaRecorder.audioBitrateMode
    - api.MediaRecorder.error_event
