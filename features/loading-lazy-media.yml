name: Lazy-loading media elements
description: |
  The `loading="lazy"` attribute for `<video>` and `<audio>` elements defers loading the media resource until the element is near the viewport. This matches the existing lazy loading behavior for `<img>` and `<iframe>` elements.
spec: https://html.spec.whatwg.org/multipage/urls-and-fetching.html#lazy-loading-attributes
group: media-elements
# No compat_features yet: the feature is not shipped in any browser.
# BCD keys (e.g. html.elements.video.loading, api.HTMLVideoElement.loading)
# should be added once they exist.
