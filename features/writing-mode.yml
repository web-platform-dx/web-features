name: writing-mode
description: The `writing-mode` CSS property sets whether text is laid out horizontally or vertically, and left to right, or right to left.
spec: https://drafts.csswg.org/css-writing-modes-4/#block-flow
caniuse: css-writing-mode
group: css
compat_features:
  core:
    - css.properties.writing-mode # former compute_from
    - svg.global_attributes.writing-mode
  modifier:
    - css.properties.writing-mode.horizontal-tb
    - css.properties.writing-mode.vertical-lr
    - css.properties.writing-mode.vertical-rl
  spare:
    - css.properties.writing-mode.sideways-lr
    - css.properties.writing-mode.sideways-rl
