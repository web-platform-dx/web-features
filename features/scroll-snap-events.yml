name: Scroll snap events
description: The `scrollsnapchanging` and `scrollsnapchange` events fire when a scroll gesture changes the selected scroll snap target.
spec: https://drafts.csswg.org/css-scroll-snap-2/#scrollsnapchange-and-scrollsnapchanging
group: scrolling
compat_features:
  core:
    - api.Document.scrollsnapchange_event # former compute_from
    - api.Document.scrollsnapchanging_event # former compute_from
    - api.Element.scrollsnapchange_event # former compute_from
    - api.Element.scrollsnapchanging_event # former compute_from
    - api.SnapEvent
    - api.SnapEvent.snapTargetBlock
    - api.SnapEvent.snapTargetInline
    - api.Window.scrollsnapchange_event # former compute_from
    - api.Window.scrollsnapchanging_event # former compute_from
  modifier:
    - api.SnapEvent.SnapEvent
