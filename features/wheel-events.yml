name: Wheel events
description: The `wheel` event fires when the user moves a mouse wheel or similar spatially rotating input device.
spec: https://w3c.github.io/pointerevents/#events-wheelevents
compat_features:
  core:
    - api.Element.wheel_event # former compute_from
    - api.WheelEvent
    - api.WheelEvent.WheelEvent
    - api.WheelEvent.deltaMode
  modifier:
    - api.WheelEvent.pinch_to_zoom_support
  spare:
    - api.WheelEvent.deltaX
    - api.WheelEvent.deltaY
    - api.WheelEvent.deltaZ
