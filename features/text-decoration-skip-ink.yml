name: text-decoration-skip-ink
description: The `text-decoration-skip-ink` CSS property sets whether to interrupt underlines and overlines where the line would cross a glyph.
spec: https://drafts.csswg.org/css-text-decor-4/#text-decoration-skip-ink-property
compat_features:
  - css.properties.text-decoration-skip-ink
  - css.properties.text-decoration-skip-ink.auto
  - css.properties.text-decoration-skip-ink.none
