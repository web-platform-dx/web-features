name: text-align
description: The `text-align` CSS property sets the horizontal placement of the inner content of a block element.
spec: https://drafts.csswg.org/css-text-4/#text-align-property
group: text
compat_features:
  core:
    - css.properties.text-align # former compute_from
    - css.properties.text-align.justify
  modifier:
    - css.properties.text-align.center
    - css.properties.text-align.end
    - css.properties.text-align.left
    - css.properties.text-align.right
    - css.properties.text-align.start
  spare:
    - css.properties.text-align.match-parent
