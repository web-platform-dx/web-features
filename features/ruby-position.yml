name: ruby-position
description: The `ruby-position` CSS property sets the position of a ruby annotation in relation to its base text. Annotations can display over, under, or interleaved with the base text.
spec: https://drafts.csswg.org/css-ruby-1/#rubypos
group: ruby
compat_features:
  core:
    - css.properties.ruby-position # former compute_from
    - css.properties.ruby-position.over # former compute_from
    - css.properties.ruby-position.under # former compute_from
  spare:
    - css.properties.ruby-position.inter-character
