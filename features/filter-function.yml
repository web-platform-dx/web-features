name: filter()
description: The `filter()` CSS function applies one or more graphic effects to a CSS image, such as a background image. You can use functions, such as `blur()` and `drop-shadow()`, alone or combined to produce different effects. For example: `background: filter(url(image.png), blur(2px))` returns a blurred vesion of image.png.
spec: https://drafts.csswg.org/filter-effects-1/#FilterCSSImageValue
group: css
caniuse: css-filter-function
