name: Fetch
description: The `fetch()` method makes asynchronous HTTP requests.
spec: https://fetch.spec.whatwg.org/
group: fetch
caniuse: fetch
compat_features:
  core:
    - api.Headers
    - api.Headers.Headers
    - api.Headers.append
    - api.Headers.delete
    - api.Headers.get
    - api.Headers.has
    - api.Headers.set
    - api.Request
    - api.Request.Request
    - api.Request.Request.options_parameter
    - api.Request.Request.options_parameter.body
    - api.Request.arrayBuffer
    - api.Request.blob
    - api.Request.bodyUsed
    - api.Request.clone
    - api.Request.credentials
    - api.Request.headers
    - api.Request.json
    - api.Request.method
    - api.Request.mode
    - api.Request.referrer
    - api.Request.text
    - api.Request.url
    - api.Response
    - api.Response.Response
    - api.Response.arrayBuffer
    - api.Response.blob
    - api.Response.bodyUsed
    - api.Response.clone
    - api.Response.headers
    - api.Response.json
    - api.Response.ok
    - api.Response.status
    - api.Response.statusText
    - api.Response.text
    - api.Response.type
    - api.Response.url
    - api.fetch # former compute_from
    - api.fetch.options_parameter
    - api.fetch.options_parameter.body
