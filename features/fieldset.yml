name: <fieldset> and <legend>
description: The `<fieldset>` and `<legend>` elements group several form control elements within a web form.
spec:
  - https://html.spec.whatwg.org/multipage/form-elements.html#the-fieldset-element
  - https://html.spec.whatwg.org/multipage/form-elements.html#the-legend-element
group:
  - forms
  - html-elements
compat_features:
  core:
    - api.HTMLFieldSetElement
    - api.HTMLFieldSetElement.form
    - api.HTMLLegendElement
    - api.HTMLLegendElement.form
    - html.elements.fieldset # former compute_from
    - html.elements.fieldset.form
    - html.elements.legend # former compute_from
  modifier:
    - api.HTMLFieldSetElement.disabled
    - api.HTMLFieldSetElement.elements
    - api.HTMLFieldSetElement.elements.type_HTMLCollection
    - api.HTMLFieldSetElement.name
    - api.HTMLFieldSetElement.type
    - html.elements.fieldset.disabled
    - html.elements.fieldset.name
