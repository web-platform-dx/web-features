name: Shadow DOM
description: Shadow DOM allows you to attach encapsulated "shadow" DOM trees to elements. A shadow DOM tree is a separate component, isolated from the scripts and styles in other parts of the document. This is a part of Web Components.
spec: https://dom.spec.whatwg.org/#shadow-trees
caniuse: shadowdomv1
group:
  - dom
  - web-components
compat_features:
  core:
    - api.Element.attachShadow # former compute_from
    - api.Element.shadowRoot
    - api.Event.composed
    - api.Event.composedPath
    - api.Node.isConnected
    - api.ShadowRoot
    - api.ShadowRoot.host
  modifier:
    - api.Element.attachShadow.options_delegatesFocus_parameter
    - api.Node.getRootNode
    - api.ShadowRoot.delegatesFocus
    - api.ShadowRoot.mode
  spare:
    - api.Element.attachShadow.options_clonable_parameter
    - api.Element.attachShadow.options_serializable_parameter
    - api.ShadowRoot.clonable
    - api.ShadowRoot.serializable
