name: Exception handling (WebAssembly)
description: Exceptions break the normal control flow of execution to represent exceptional behavior, such as an error. You can respond to the exception in JavaScript code.
spec: https://github.com/WebAssembly/exception-handling/blob/main/proposals/exception-handling/legacy/Exceptions.md
group: webassembly
compat_features:
  core:
    - webassembly.api.Exception # former compute_from
    - webassembly.api.Exception.Exception
    - webassembly.api.Exception.Exception.options_parameter_traceStack
    - webassembly.api.Exception.getArg
    - webassembly.api.Exception.is
    - webassembly.api.Tag
    - webassembly.api.Tag.Tag
    - webassembly.exception-handling
  spare:
    - webassembly.api.Exception.stack
    - webassembly.api.Tag.type
