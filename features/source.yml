name: <source>
description: The `<source>` element sets a media resource for the `<picture>`, `<video>`, and `<audio>` elements.
spec: https://html.spec.whatwg.org/multipage/embedded-content.html#the-picture-element
group:
  - media-elements
  - html-elements
compat_features:
  core:
    - html.elements.source # former compute_from
    - html.elements.source.src
    - html.elements.source.type
  modifier:
    - html.elements.source.height
    - html.elements.source.media
    - html.elements.source.width

# Included in srcset (see #1448)
#   - html.elements.source.sizes
#   - html.elements.source.srcset
