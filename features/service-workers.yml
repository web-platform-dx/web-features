name: Service workers
description: The service worker of a website is a script that runs in its own thread and which acts as local proxy that intercepts network requests from the website. Use a service worker to implement advanced caching strategies, offline support, background tasks, or push notification support on your website.
spec: https://w3c.github.io/ServiceWorker/
caniuse: serviceworkers
group: workers
compat_features:
  core:
    - api.Cache
    - api.Cache.add
    - api.Cache.delete
    - api.Cache.keys
    - api.Cache.match
    - api.Cache.put
    - api.Cache.worker_support
    - api.CacheStorage
    - api.CacheStorage.delete
    - api.CacheStorage.has
    - api.CacheStorage.keys
    - api.CacheStorage.open
    - api.CacheStorage.worker_support
    - api.Client
    - api.Client.frameType
    - api.Client.id
    - api.Client.postMessage
    - api.Client.url
    - api.Clients
    - api.Clients.claim
    - api.Clients.openWindow
    - api.ExtendableEvent
    - api.ExtendableEvent.ExtendableEvent
    - api.ExtendableEvent.waitUntil
    - api.FetchEvent
    - api.FetchEvent.FetchEvent
    - api.FetchEvent.request
    - api.FetchEvent.respondWith
    - api.Navigator.serviceWorker
    - api.ServiceWorker
    - api.ServiceWorker.postMessage
    - api.ServiceWorker.scriptURL
    - api.ServiceWorker.state
    - api.ServiceWorker.statechange_event
    - api.ServiceWorkerContainer
    - api.ServiceWorkerContainer.controller
